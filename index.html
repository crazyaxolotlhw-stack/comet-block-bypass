<script>
function OpenCometBlob() {
    const htmlContent = `
    <!DOCTYPE html>
    <html>
        <head>
            <meta charset="UTF-8">
        </head>
        <body style="margin:0; padding:0; height:100vh; overflow:hidden;">
        </body>
    </html>
    `;

    const blob = new Blob([htmlContent], { type: "text/html" });
    const blobUrl = URL.createObjectURL(blob);

    let newTab = window.open(blobUrl, "_blank");

    if (!newTab) {
        alert("Enable pop-ups and reload the page.");
        return;
    }

    const interval = setInterval(() => {
        try {
            if (newTab.document && newTab.document.body) {
                clearInterval(interval);

                let iframe = newTab.document.createElement("iframe");
                iframe.style.border = "none";
                iframe.style.width = "100%";
                iframe.style.height = "100%";
                iframe.referrerpolicy = "no-referrer";
                iframe.allow = "fullscreen";

                iframe.src = window.location.href;

                newTab.document.body.appendChild(iframe);
            }
        } catch (e) {
        }
    }, 50);
}

function aboutblank() {
    let newBlankTab = window.open("about:blank", "_blank");

    if (!newBlankTab) {
        alert("Enable pop-ups and reload the page.");
        return;
    }

    newBlankTab.document.write(`
        <html>
            <head>
                <title>Loading...</title>
                <style>
                    body { margin:0; padding:0; overflow:hidden; }
                    iframe { width:100vw; height:100vh; border:none; }
                </style>
            </head>
            <body>
                <iframe src="${window.location.href}" allow="fullscreen"></iframe>
            </body>
        </html>
    `);

    newBlankTab.document.close();
}
